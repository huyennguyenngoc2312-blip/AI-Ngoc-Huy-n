<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            margin-bottom: 20px;
        }
        .social-btn {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }
        .facebook { background: #1877f2; }
        .zalo { background: #0068ff; }
        .linkedin { background: #0077b5; }
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .gift-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .gift-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
        }
        .message-form {
            margin-top: 20px;
        }
        .message-form input, .message-form textarea {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
        }
        .message-form input::placeholder, .message-form textarea::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        .message-form .btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            color: white;
        }
        .message-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <img src="https://via.placeholder.com/150" alt="Ảnh đại diện" class="profile-img" id="profileImg">
        <h1 id="name">Họ Tên</h1>
        <p id="position">Chức vụ tại JOYWORK</p>
        <div class="social-links">
            <a href="#" class="social-btn facebook" id="facebookLink">Facebook</a>
            <a href="#" class="social-btn zalo" id="zaloLink">Zalo</a>
            <a href="#" class="social-btn linkedin" id="linkedinLink">LinkedIn</a>
        </div>
        <button class="gift-btn" onclick="launchFireworks()">Tặng quà</button>
        <div class="message-form">
            <h3>Để lại lời nhắn</h3>
            <input type="text" id="senderName" placeholder="Tên của bạn" class="form-control mb-2">
            <textarea id="message" placeholder="Lời nhắn" class="form-control mb-2" rows="3"></textarea>
            <button onclick="submitMessage()" class="btn">Gửi</button>
        </div>
        <div id="messages" class="mt-4"></div>
    </div>
    <canvas id="fireworksCanvas"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Thay đổi thông tin cá nhân ở đây
        document.getElementById('name').textContent = 'Nguyễn Ngọc Huyền'; // Thay bằng họ tên thật
        document.getElementById('position').textContent = 'CEO'; // Thay bằng chức vụ thật
        document.getElementById('profileImg').src = 'https://scontent.fhan15-2.fna.fbcdn.net/v/t39.30808-6/597592080_1383730299803645_8457431272093332566_n.jpg?_nc_cat=100&ccb=1-7&_nc_sid=1d70fc&_nc_eui2=AeEAUQFfri2DoDa4lxwUsYtahZqLk66pQzyFmouTrqlDPBFkdEkm6JWkFnOiQ07CXSp3oT5GdVGdunxQ7Y77E-ty&_nc_ohc=_U26xMFbZdQQ7kNvwHD9mLx&_nc_oc=AdpKSHSEt8zvkW69OuSsXgpcbEfLxn-C9BG0q4tYPCY8hy2003xwDohVPzMFIEGCj6yVetE593of9o8WLT7xkVfG&_nc_zt=23&_nc_ht=scontent.fhan15-2.fna&_nc_gid=TnPt0JGchhjqWbGTqGH7_A&_nc_ss=7a3a8&oh=00_Af3HFbXqped7jaIZvrMgGi_l0XZKkR8lE7phFavf_X-EQw&oe=69DDAD8E'; // Thay bằng link ảnh thật từ Facebook/Zalo
        document.getElementById('facebookLink').href = 'https://www.facebook.com/ngoc.huyen.539720'; // Thay bằng link Facebook thật
        document.getElementById('zaloLink').href = 'https://zalo.me/0845551959'; // Thay bằng link Zalo thật
        document.getElementById('linkedinLink').href = '#'; // Thay bằng link LinkedIn thật

        function submitMessage() {
            const name = document.getElementById('senderName').value;
            const msg = document.getElementById('message').value;
            if (name && msg) {
                const messages = JSON.parse(localStorage.getItem('messages') || '[]');
                messages.push({ name, msg, date: new Date().toLocaleString() });
                localStorage.setItem('messages', JSON.stringify(messages));
                loadMessages();
                // Gửi tin nhắn đến Telegram
                const token = '8692136632:AAGGt_ep1uy8Cid8POQn-VnHIgLWYVvZtIs';
                const chatId = '5728328668';
                fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: `Tin nhắn mới từ ${name}: ${msg}` })
                }).then(response => {
                    if (response.ok) {
                        console.log('Tin nhắn đã gửi đến Telegram');
                    } else {
                        console.error('Lỗi gửi tin nhắn');
                    }
                });
                // Xóa input sau khi gửi
                document.getElementById('senderName').value = '';
                document.getElementById('message').value = '';
                alert('Lời nhắn đã được gửi!');
            } else {
                alert('Vui lòng nhập tên và lời nhắn.');
            }
        }

        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('messages') || '[]');
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '<h4>Tin nhắn đã nhận:</h4>';
            messages.forEach(m => {
                const div = document.createElement('div');
                div.className = 'message-item';
                div.innerHTML = `<strong>${m.name}</strong> (${m.date}): ${m.msg}`;
                messagesDiv.appendChild(div);
            });
        }

        // Load messages on page load
        loadMessages();

        // Hiệu ứng pháo hoa
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function launchFireworks() {
            const particles = [];
            const particleCount = 100;

            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    life: 100
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, index) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // gravity
                    p.life--;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();

                    if (p.life <= 0) {
                        particles.splice(index, 1);
                    }
                });

                if (particles.length > 0) {
                    requestAnimationFrame(animate);
                }
            }

            animate();
        }
    </script>
</body>
</html>
